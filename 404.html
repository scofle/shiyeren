<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面未找到 — 破薪阁</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-section {
      text-align: center;
      padding: 80px 20px;
    }
    .error-section .error-code {
      font-size: 5rem;
      font-weight: 700;
      color: #d4a574;
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-section h1 {
      font-size: 1.4rem;
      color: #3e3e3e;
      margin-bottom: 12px;
    }
    .error-section p {
      color: #888;
      margin-bottom: 28px;
    }
  </style>
</head>
<body>
  <main class="main-content">
    <section class="error-section">
      <div class="error-code">404</div>
      <h1>页面走丢了</h1>
      <p>别担心，回首页重新找找方向吧。</p>
      <a href="index.html" class="btn btn-primary">返回首页</a>
    </section>
  </main>
</body>
</html>
