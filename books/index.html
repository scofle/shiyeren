      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.05);

    .book-entry-card .book-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .book-entry-card h2 {
      font-size: 1.4rem;
      color: #3e3e3e;
      margin-bottom: 8px;
    }

    .book-entry-card .book-desc {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 8px;
      line-height: 1.6;
    }

    .book-entry-card .book-hint {
      color: #d4a574;
      font-size: 0.88rem;
      margin-bottom: 28px;

    .book-entry-card .btn {
      min-width: 200px;
