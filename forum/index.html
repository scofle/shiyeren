<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>论坛 — 破薪阁</title>
  <meta name="description" content="失业人的回响吧，匿名倾诉，互助取暖。">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* 论坛入口大卡片 */
    .forum-entry-card {
      max-width: 560px;
      margin: 0 auto 48px;
      background: #fff;
      border-radius: 20px;
      padding: 48px 32px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.05);
    }

    .forum-entry-card .forum-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .forum-entry-card h2 {
      font-size: 1.4rem;
      color: #3e3e3e;
      margin-bottom: 8px;
    }

    .forum-entry-card .forum-desc {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 8px;
      line-height: 1.6;
    }

    .forum-entry-card .forum-hint {
      color: #d4a574;
      font-size: 0.88rem;
      margin-bottom: 28px;
    }

    .forum-entry-card .btn {
      min-width: 200px;
    }

    /* 提示区 */
    .forum-tips {
      max-width: 560px;
      margin: 0 auto 48px;
      padding: 0 20px;
    }

    .forum-tips h3 {
      font-size: 1rem;
      color: #555;
      margin-bottom: 12px;
      text-align: center;
    }

    .forum-tips ul {
      color: #888;
      font-size: 0.9rem;
      line-height: 2;
    }

    .forum-tips ul li::before {
      content: "• ";
      color: #d4a574;
    }
  </style>
</head>
<body>

  <!-- ========== 导航栏 ========== -->
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="logo">
        <span class="logo-icon">&#x1F3E0;</span>破薪阁
      </a>
      <button class="hamburger" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="../index.html">首页</a></li>
        <li><a href="../projects/index.html">搞钱案例</a></li>
        <li><a href="../resources/index.html">资料库</a></li>
        <li><a href="../books/index.html">网络书库</a></li>
        <li><a href="index.html" class="active">论坛</a></li>
      </ul>
    </div>
  </nav>

  <main class="main-content">

    <!-- ========== 论坛入口 ========== -->
    <section class="container" style="padding-top: 32px;">
      <div class="forum-entry-card">
        <div class="forum-icon">💬</div>
        <h2>失业人的回响吧</h2>
        <p class="forum-desc">在百度贴吧找到和你一样的人，交流搞钱心得、倾诉心事。</p>
        <p class="forum-hint">本吧包含树洞专区，欢迎匿名倾诉</p>
        <a href="https://tieba.baidu.com/f?kw=%E5%A4%B1%E4%B8%9A%E4%BA%BA%E7%9A%84%E5%9B%9E%E5%93%8D"
           class="btn btn-primary btn-large"
           target="_blank"
           rel="noopener noreferrer">
          进入贴吧 &#8599;
        </a>
      </div>
    </section>

    <!-- ========== 小贴士 ========== -->
    <section class="forum-tips">
      <h3>进吧须知</h3>
      <ul>
        <li>贴吧无需注册即可浏览，发帖需登录百度账号</li>
        <li>树洞专区支持匿名发帖，你的隐私会被保护</li>
        <li>友善交流，禁止人身攻击和广告引流</li>
        <li>遇到有价值的帖子记得收藏，方便后续回看</li>
      </ul>
    </section>

  </main>

  <!-- ========== 页脚 ========== -->
  <footer class="footer">
    <p class="contact">抖音/视频号：<strong>真陈说</strong></p>
    <p class="copyright">&copy; 2025 破薪阁 shiyeren.top</p>
  </footer>

  <script src="../js/main.js"></script>
</body>
</html>
