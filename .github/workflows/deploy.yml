# ============================================================
#  破薪阁 — GitHub Actions 自动部署到阿里云 OSS
#  每次推送 main 分支时自动同步文件
# ============================================================

name: 部署到阿里云 OSS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 ossutil
        run: |
          wget -q https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil64 -O ossutil
          chmod +x ossutil
          sudo mv ossutil /usr/local/bin/

      - name: 配置 ossutil
        run: |
          ossutil config --endpoint oss-cn-hongkong.aliyuncs.com \
            --access-key-id ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }} \
            --access-key-secret ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}

      - name: 同步文件到 OSS
        run: |
          ossutil sync . oss://shiveren-hk \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "DEPLOY.md" \
            --exclude ".gitignore"