# ============================================================
#  破薪阁 — GitHub Actions 自动部署到阿里云 OSS
# ============================================================

name: 部署到阿里云 OSS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 ossutil
        run: |
          curl -fsSL https://github.com/aliyun/ossutil/releases/download/v2.0.4/ossutil-v2.0.4-linux-amd64.zip -o ossutil.zip
          unzip -q ossutil.zip
          chmod +x ossutil
          sudo mv ossutil /usr/local/bin/

      - name: 验证连通性
        run: |
          ossutil ls oss://shiveren-hk \
            --endpoint oss-cn-hongkong.aliyuncs.com \
            --access-key-id ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }} \
            --access-key-secret ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}

      - name: 同步文件到 OSS
        run: |
          ossutil sync . oss://shiveren-hk \
            --endpoint oss-cn-hongkong.aliyuncs.com \
            --access-key-id ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }} \
            --access-key-secret ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "DEPLOY.md" \
            --exclude ".gitignore"