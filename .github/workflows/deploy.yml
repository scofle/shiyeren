# ============================================================
#  破薪阁 — GitHub Actions 自动部署到阿里云 OSS
# ============================================================

name: 部署到阿里云 OSS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 ossutil（动态获取最新版）
        run: |
          URL=$(curl -s https://api.github.com/repos/aliyun/ossutil/releases/latest | grep browser_download_url | grep linux | grep amd64 | cut -d'"' -f4 | head -1)
          if [ -z "$URL" ]; then URL="https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil64"; fi
          echo "Downloading $URL"
          curl -fsSL "$URL" -o ossutil
          chmod +x ossutil
          sudo mv ossutil /usr/local/bin/

      - name: 同步文件到 OSS
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
        run: |
          ossutil sync . oss://shiveren-hk \
            --endpoint oss-cn-hongkong.aliyuncs.com \
            --access-key-id "$ALIBABA_CLOUD_ACCESS_KEY_ID" \
            --access-key-secret "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "DEPLOY.md" \
            --exclude ".gitignore"