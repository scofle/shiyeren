# ============================================================
#  破薪阁 — GitHub Actions 自动部署到阿里云 OSS
# ============================================================

name: 部署到阿里云 OSS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 同步文件到 OSS
        env:
          OSS_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          OSS_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
        run: |
          pip install oss2 -q
          python3 << 'PYEOF'
          import os, oss2

          auth = oss2.Auth(os.environ["OSS_KEY"], os.environ["OSS_SECRET"])
          bucket = oss2.Bucket(auth, "oss-cn-hongkong.aliyuncs.com", "shiveren-hk")

          # 获取 OSS 现有文件列表
          existing = set()
          for obj in oss2.ObjectIteratorV2(bucket, max_keys=1000):
              existing.add(obj.key)

          uploaded = 0
          deleted = set(existing)

          for root, dirs, files in os.walk("."):
              # 排除目录
              dirs[:] = [d for d in dirs if d not in (".git", ".github")]
              if root == ".":
                  dirs[:] = [d for d in dirs if d not in (".git", ".github")]
              for f in files:
                  if f in ("DEPLOY.md", ".gitignore"):
                      continue
                  local = os.path.join(root, f)
                  remote = local.replace("\\", "/").lstrip("./")
                  bucket.put_object_from_file(remote, local)
                  deleted.discard(remote)
                  uploaded += 1
                  print(f"  UP {remote}")

          # 删除 OSS 上多余的文件
          for key in deleted:
              if not key.endswith("/"):
                  bucket.delete_object(key)
                  print(f"  DEL {key}")

          print(f"\nDone: {uploaded} uploaded, {len(deleted)} deleted")
          PYEOF